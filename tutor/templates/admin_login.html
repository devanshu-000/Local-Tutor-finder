<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login – TutorFinder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0d47a1 0%, #1a73e8 60%, #42a5f5 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .login-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 16px;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.18);
            overflow: hidden;
        }

        .login-card-header {
            background: linear-gradient(135deg, #0d47a1, #1a73e8);
            padding: 32px 36px 28px;
            text-align: center;
        }
        .shield-icon {
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            margin: 0 auto 14px;
            border: 2px solid rgba(255,255,255,0.25);
        }
        .login-card-header h2 {
            color: white;
            font-size: 1.4rem;
            font-weight: 800;
            margin-bottom: 4px;
        }
        .login-card-header p {
            color: rgba(255,255,255,0.75);
            font-size: 0.85rem;
            margin: 0;
        }

        .login-card-body { padding: 32px 36px; }

        .form-label {
            font-size: 0.82rem;
            font-weight: 600;
            color: #555;
        }
        .form-control {
            border-radius: 10px;
            border: 1.5px solid #e0e0e0;
            padding: 11px 14px;
            font-size: 0.93rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-control:focus {
            border-color: #1a73e8;
            box-shadow: 0 0 0 3px rgba(26,115,232,0.12);
        }

        .input-icon-wrap {
            position: relative;
        }
        .input-icon-wrap .icon {
            position: absolute;
            left: 13px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
            font-size: 1rem;
            pointer-events: none;
        }
        .input-icon-wrap .form-control {
            padding-left: 38px;
        }
        .password-toggle {
            position: absolute;
            right: 13px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #aaa;
            cursor: pointer;
            padding: 0;
            font-size: 1rem;
        }
        .password-toggle:hover { color: #555; }

        .btn-signin {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.97rem;
            background: linear-gradient(135deg, #1a73e8, #0d47a1);
            border: none;
            color: white;
            transition: opacity 0.2s, transform 0.15s;
        }
        .btn-signin:hover { opacity: 0.9; transform: translateY(-1px); color: white; }

        .alert-danger {
            background: #fce8e6;
            color: #c5221f;
            border: none;
            border-radius: 10px;
            font-size: 0.88rem;
            padding: 10px 14px;
        }
        .alert-success {
            background: #e6f4ea;
            color: #1e7e34;
            border: none;
            border-radius: 10px;
            font-size: 0.88rem;
            padding: 10px 14px;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a { color: rgba(255,255,255,0.85); font-size: 0.88rem; text-decoration: none; }
        .back-link a:hover { color: #fff; text-decoration: underline; }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 18px 0;
            color: #ccc;
            font-size: 0.78rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #eee;
        }
    </style>
</head>
<body>

<div class="login-wrapper">
    <div>
        <div class="login-card">

            <!-- Card Header -->
            <div class="login-card-header">
                <div class="shield-icon">🛡️</div>
                <h2>Admin Portal</h2>
                <p>Sign in to manage tutor verifications</p>
            </div>

            <!-- Card Body -->
            <div class="login-card-body">

                <!-- Flash Messages -->
                {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, msg in messages %}
                    <div class="alert alert-{{ 'danger' if category == 'error' else category }} mb-3">
                        {{ msg }}
                    </div>
                    {% endfor %}
                {% endif %}
                {% endwith %}

                <form method="POST" action="/admin_login" autocomplete="off">

                    <!-- Admin Name -->
                    <div class="mb-3">
                        <label class="form-label">Admin Name</label>
                        <div class="input-icon-wrap">
                            <span class="icon">👤</span>
                            <input type="text" name="name" class="form-control"
                                   placeholder="Enter admin name" required autocomplete="off">
                        </div>
                    </div>

                    <!-- Password -->
                    <div class="mb-4">
                        <label class="form-label">Password</label>
                        <div class="input-icon-wrap">
                            <span class="icon">🔒</span>
                            <input type="password" name="password" id="adminPassword"
                                   class="form-control" placeholder="Enter password" required>
                            <button type="button" class="password-toggle"
                                    onclick="togglePassword('adminPassword', this)"
                                    tabindex="-1">👁️</button>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-signin">Sign In to Dashboard</button>

                </form>

            </div>
        </div>

        <div class="back-link mt-3">
            <a href="/">← Back to Home</a>
        </div>
    </div>
</div>

<script>
function togglePassword(inputId, btn) {
    const input = document.getElementById(inputId);
    const isHidden = input.type === 'password';
    input.type = isHidden ? 'text' : 'password';
    btn.textContent = isHidden ? '🙈' : '👁️';
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
